<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">✎</div>
    Notes
  </div>
  <button class="new-note-btn" id="new-note-btn">＋ New Note</button>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-cat="all">All Notes</div>
    <div class="nav-item" data-cat="pinned">Pinned</div>
    <div class="nav-item" data-cat="journal">Journal</div>
    <div class="nav-item" data-cat="work">Work</div>
    <div class="nav-item" data-cat="books">Books</div>
    <div class="nav-item" data-cat="travel">Travel</div>
    <div class="nav-item" data-cat="dev">Dev</div>
  </nav>
</aside>

<!-- NOTE LIST (main view) -->
<div class="note-list-panel">
  <div id="pixel-snow-bg"></div>
  <div class="snow-color-picker" id="snow-color-picker">
    <button class="snow-swatch" data-color="#00736b" style="background:#00736b" title="Teal"></button>
    <button class="snow-swatch" data-color="#f5a623" style="background:#f5a623" title="Amber"></button>
    <button class="snow-swatch" data-color="#7c5cff" style="background:#7c5cff" title="Violet"></button>
    <button class="snow-swatch" data-color="#e0466e" style="background:#e0466e" title="Rose"></button>
    <button class="snow-swatch" data-color="#4ecdc4" style="background:#4ecdc4" title="Cyan"></button>
    <input type="color" id="snow-color-custom" title="Custom color" value="#00736b" />
  </div>
  <div class="list-header">
    <h2 id="list-heading">All Notes</h2>
    <span class="note-count" id="note-count">0</span>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search notes..." />
  </div>
  <div class="notes-scroll-container">
    <div class="notes-scroll" id="notes-scroll">
      <div class="empty-list">Loading…</div>
    </div>
    <div class="top-gradient" id="top-gradient"></div>
    <div class="bottom-gradient" id="bottom-gradient"></div>
  </div>
</div>

<!-- Backdrop for centered editor -->
<div class="editor-backdrop" id="editor-backdrop"></div>

<!-- EDITOR (centered modal) -->
<div class="editor-panel" id="editor-panel">
  <div id="editor-area" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="editor-toolbar">
      <button class="toolbar-btn" id="close-editor-btn" title="Close">✕</button>
    </div>
    <div class="editor-body">
      <input type="text" id="editor-title" placeholder="Title" />
      <div class="editor-meta">
        <span>🕐</span>
        <span id="editor-date">—</span>
        <span class="dot">●</span>
        <select id="editor-category">
          <option value="notes">Notes</option>
          <option value="pinned">Pinned</option>
          <option value="journal">Journal</option>
          <option value="work">Work</option>
          <option value="books">Books</option>
          <option value="travel">Travel</option>
          <option value="dev">Dev</option>
        </select>
      </div>
      <textarea id="editor-content" placeholder="Start writing…"></textarea>
    </div>
    <div class="editor-actions">
      <button class="btn-save" id="save-btn">Save Note</button>
      <button class="btn-danger" id="discard-btn">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Confirm delete modal -->
<div id="confirm-overlay" class="confirm-overlay hidden">
  <div class="confirm-box">
    <p id="confirm-message">Delete this note?</p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="confirm-cancel">Cancel</button>
      <button class="btn-danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- Supabase UMD build — works with plain <script> tags, no server needed -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script type="module" src="pixel-snow.js"></script>
<script defer src="app.js"></script>
</body>
</html>
