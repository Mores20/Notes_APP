<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">✎</div>
    Notes
  </div>
  <button class="new-note-btn" id="new-note-btn">+ New Note</button>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-cat="all">All Notes</div>
    <div class="nav-item" data-cat="pinned">Pinned</div>
    <div class="nav-item" data-cat="journal">Journal</div>
    <div class="nav-item" data-cat="work">Work</div>
    <div class="nav-item" data-cat="books">Books</div>
    <div class="nav-item" data-cat="travel">Travel</div>
    <div class="nav-item" data-cat="dev">Dev</div>
  </nav>
</aside>

<div class="note-list-panel">
  <div class="list-header">
    <h2 id="list-heading">All Notes</h2>
    <span class="note-count" id="note-count">0</span>
  </div>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search notes..." />
  </div>
  <div class="notes-scroll" id="notes-scroll">
    <div class="empty-list">Loading…</div>
  </div>
</div>

<div class="editor-panel">

  <div class="welcome-state" id="welcome-state">
    <span class="big">✎</span>
    <p>Select a note or create a new one</p>
  </div>

  <div id="editor-area" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="editor-toolbar">
      <button class="toolbar-btn danger" id="delete-btn" title="Delete">🗑</button>
    </div>
    <div class="editor-body">
      <input type="text" id="editor-title" placeholder="Title" />
      <div class="editor-meta">
        <span id="editor-date">—</span>
        <span class="dot">●</span>
        <select id="editor-category">
          <option value="notes">Notes</option>
          <option value="pinned">Pinned</option>
          <option value="journal">Journal</option>
          <option value="work">Work</option>
          <option value="books">Books</option>
          <option value="travel">Travel</option>
          <option value="dev">Dev</option>
        </select>
      </div>
      <textarea id="editor-content" placeholder="Start writing…"></textarea>
    </div>
    <div class="editor-actions">
      <button class="btn-save" id="save-btn">Save Note</button>
      <button class="btn-cancel" id="discard-btn">Discard</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
